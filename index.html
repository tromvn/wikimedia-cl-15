<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>wikimedia-cl-15</title>
    </head>
    <body>
        <div id="app">
            <header class="site-header">
                <div class="site-header-inner">
                    <a href="/" class="site-brand">
                        Wikimedia Chile
                    </a>

                    <div class="timeline-controls">
                        <div class="timeline-filters" aria-label="Filtrar hitos">
                            <button type="button" data-filter="article">
                                Artículos
                            </button>

                            <button type="button" data-filter="news">
                                Noticias
                            </button>

                            <button type="button" data-filter="video">
                                Videos
                            </button>
                        </div>

                        <div class="timeline-search">
                            <input
                                type="search"
                                placeholder="Buscar hito..."
                                aria-label="Buscar hito"
                            />
                        </div>
                    </div>
                </div>
            </header>

            <main class="site-main">
                <section class="hero">
                    <!-- Banner conmemorativo -->
                </section>

                <section class="timeline-section">
                    <ol id="timeline"></ol>
                </section>
            </main>

            <footer class="bg-surface">
                <!-- links, redes -->
            </footer>
        </div>

        <!-- Pop up -->
        <dialog id="hito-dialog">
            <div class="dialog-panel">
                <button
                    class="dialog-close"
                    type="button"
                    aria-label="Cerrar detalle"
                >
                    ×
                </button>

                <div class="dialog-content"></div>
            </div>
        </dialog>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>

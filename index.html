<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wikimedia Chile — 15 años</title>
    </head>
    <body>
        <div id="app">
            <header class="site-header">
                <div class="site-header-inner">
                    <a href="/" class="site-brand">
                        <img
                            src="/3840px-Wikimedia_Chile_logo_-_horizontal-white.svg"
                            alt="Wikimedia Chile"
                            width="200"
                            height="auto"
                        />
                    </a>

                    <div class="timeline-controls">
                        <div class="timeline-filters" aria-label="Filtrar hitos">
                            <button type="button" data-filter="article">
                                Artículos
                            </button>

                            <button type="button" data-filter="news">
                                Noticias
                            </button>

                            <button type="button" data-filter="video">
                                Videos
                            </button>
                        </div>

                        <div class="timeline-search">
                            <input
                                type="search"
                                placeholder="Buscar hito..."
                                aria-label="Buscar hito"
                            />
                            <button class="search-clear" type="button" aria-label="Limpiar búsqueda">×</button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="site-main">
                <section class="hero">
                    <div class="hero-ornaments" aria-hidden="true">
                        <img src="/src/assets/ornamento.svg" alt="" class="hero-ornament hero-ornament--1" />
                        <img src="/src/assets/ornamento-3.svg" alt="" class="hero-ornament hero-ornament--2" />
                        <img src="/src/assets/ornamento-brillito.svg" alt="" class="hero-ornament hero-ornament--3" />
                        <img src="/src/assets/ornamento-14.svg" alt="" class="hero-ornament hero-ornament--4" />
                    </div>
                    <div class="hero-content">
                        <span class="hero-numeral">15</span>
                        <span class="hero-label">años</span>
                        <h1 class="hero-title">Wikimedia Chile</h1>
                        <p class="hero-subtitle">Conocimiento libre, comunidad y patrimonio</p>
                    </div>
                </section>

                <section class="timeline-section">
                    <ol id="timeline"></ol>
                </section>
            </main>

            <footer class="site-footer">
                <div class="site-footer-inner">
                    <span>Wikimedia Chile — 15 años de conocimiento libre</span>
                    <a
                        href="https://commons.wikimedia.org/wiki/Category:Wikimedia_Chile"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        Archivo multimedia en Commons
                    </a>
                </div>
            </footer>
        </div>

        <dialog id="hito-dialog">
            <div class="dialog-panel">
                <button
                    class="dialog-close"
                    type="button"
                    aria-label="Cerrar detalle"
                >
                    ×
                </button>

                <div class="dialog-content"></div>
            </div>
        </dialog>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
